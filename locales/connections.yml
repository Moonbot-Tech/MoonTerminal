# Вкладка «Подключения» окна настроек (ядра, группы, статусы, колонки, тултипы).
# Формат rust-i18n `_version: 2`: ключ → карта локаль→строка. Интерполяция: %{var}.
# Колонки таблиц — короткие ярлыки (Акт/Окн/Орд/…); переводы тоже короткие.
_version: 2

conn.servers_heading:
  ru: "Ядра (серверы)"
  en: "Cores (servers)"
  es: "Núcleos (servidores)"
conn.market_src:
  ru: "Источник рыночных данных"
  en: "Market data source"
  es: "Fuente de datos de mercado"
conn.market_src_tip:
  ru: "Откуда брать крестики и стакан. Дедуп: одно ядро-провайдер на биржу тянет рынок за всех (экономно при многих ядрах). По ядрам: каждый чарт берёт рынок со своего ядра (без дедупа)."
  en: "Where crosses and the order book come from. Dedup: one provider core per exchange serves the market for all (cheap with many cores). Per-core: each chart reads the market from its own core (no dedup)."
  es: "De dónde vienen los cruces y el libro de órdenes. Dedup: un núcleo proveedor por bolsa sirve el mercado a todos (económico con muchos núcleos). Por núcleo: cada gráfico lee el mercado de su propio núcleo (sin dedup)."
conn.market_dedup:
  ru: "Дедуп (провайдер на биржу)"
  en: "Dedup (provider per exchange)"
  es: "Dedup (proveedor por bolsa)"
conn.market_percore:
  ru: "По ядрам (без дедупа)"
  en: "Per-core (no dedup)"
  es: "Por núcleo (sin dedup)"
conn.groups_heading:
  ru: "Группы"
  en: "Groups"
  es: "Grupos"
conn.no_groups:
  ru: "добавь ядро ниже и впиши ему «Группу» — появится ветка группы"
  en: "add a core below and give it a “Group” — a group branch will appear"
  es: "añade un núcleo abajo y asígnale un «Grupo» — aparecerá una rama de grupo"
conn.show_group:
  ru: "Показать окно группы"
  en: "Show group window"
  es: "Mostrar ventana del grupo"
# Глиф + — отдельным segment-ом в коде, в словаре только текст.
conn.add_core:
  ru: "Добавить ядро (в «default»)"
  en: "Add core (to “default”)"
  es: "Añadir núcleo (a «default»)"
conn.add_core_short:
  ru: "ядро"
  en: "core"
  es: "núcleo"
conn.groups_panel_heading:
  ru: "Ядра по группам"
  en: "Cores by group"
  es: "Núcleos por grupo"
conn.groups_panel_tip:
  ru: "Группа = отдельное главное окно (ядра группы в одном окне). Колонка «Чарты» сводит детекты с нескольких ядер группы в один график."
  en: "A group = a separate main window (the group's cores live in one window). The “Charts” column merges detects from several cores of a group into one chart."
  es: "Un grupo = una ventana principal aparte (los núcleos del grupo viven en una ventana). La columna «Gráficos» une las detecciones de varios núcleos de un grupo en un solo gráfico."
conn.member_count:
  ru: "%{n} ядр."
  en: "%{n} cores"
  es: "%{n} núcleos"
conn.icon_btn:
  ru: "Иконка"
  en: "Icon"
  es: "Icono"
conn.icon_for:
  ru: "Иконка для «%{name}»"
  en: "Icon for “%{name}”"
  es: "Icono de «%{name}»"
conn.pick:
  ru: "выбор"
  en: "pick"
  es: "elegir"
conn.delete:
  ru: "Удал"
  en: "Del"
  es: "Elim"
conn.reconnect:
  ru: "Переподключить"
  en: "Reconnect"
  es: "Reconectar"
conn.filter_note:
  ru: "фильтр на клиенте"
  en: "client-side filter"
  es: "filtro en el cliente"

