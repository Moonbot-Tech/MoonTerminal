# Подсказки (тултипы)
conn.tip.act:
  ru: "Подключаться к ядру"
  en: "Connect to the core"
  es: "Conectarse al núcleo"
conn.tip.win:
  ru: "Рисовать окно/чарт. Выкл = headless: данные в БД/память без окна"
  en: "Draw window/chart. Off = headless: data to DB/memory without a window"
  es: "Dibujar ventana/gráfico. Desactivado = headless: datos a BD/memoria sin ventana"
conn.tip.flags:
  ru: "Приём данных от ядра. Серая = принимаем всё; цветная = часть категорий выключена. Клик — настроить."
  en: "Data received from the core. Gray = all on; colored = some categories off. Click to configure."
  es: "Datos recibidos del núcleo. Gris = todo activado; en color = algunas categorías desactivadas. Clic para configurar."
conn.tip.group:
  ru: "Группа = ОТДЕЛЬНОЕ главное окно. Все ядра с одинаковым именем группы живут в одном окне; новое имя группы → новое главное окно."
  en: "Group = a SEPARATE main window. All cores with the same group name live in one window; a new group name → a new main window."
  es: "Grupo = una ventana principal SEPARADA. Todos los núcleos con el mismo nombre de grupo viven en una ventana; un nombre de grupo nuevo → una ventana principal nueva."
conn.tip.bundle:
  ru: "Имя чарт-связки: детекты AddToChart с НЕСКОЛЬКИХ ядер одной группы с одинаковым именем сводятся в ОДИН чарт (одну вкладку, имя — в её заголовке). Пусто = по глобальной настройке (своя вкладка на ядро / все в одной)."
  en: "Chart bundle name: AddToChart detects from SEVERAL cores of one group sharing the same name merge into ONE chart (one tab, the name in its title). Empty = per the global setting (a tab per core / all in one)."
  es: "Nombre del conjunto de gráfico: las detecciones AddToChart de VARIOS núcleos de un grupo con el mismo nombre se unen en UN gráfico (una pestaña, el nombre en su título). Vacío = según el ajuste global (una pestaña por núcleo / todas en una)."
conn.tip.orders:
  ru: "Открытые ордера"
  en: "Open orders"
  es: "Órdenes abiertas"
conn.tip.detects:
  ru: "Детекты"
  en: "Detects"
  es: "Detecciones"
conn.tip.reports:
  ru: "Отчёты по закрытым ордерам → SQLite"
  en: "Reports on closed orders → SQLite"
  es: "Informes de órdenes cerradas → SQLite"
